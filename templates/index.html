<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Approval Prediction</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    h2 { text-align: center; color: #333; margin-bottom: 6px; font-size: 1.6em; }
    .subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.95em; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-weight: 600; margin-bottom: 4px; color: #444; font-size: 0.9em; }
    select, input[type="number"] { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95em; background: #fafafa; transition: border-color 0.2s; }
    select:focus, input:focus { outline: none; border-color: #667eea; background: #fff; }
    button { grid-column: 1 / -1; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 1.05em; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s; margin-top: 8px; }
    button:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
    .result { text-align: center; padding: 16px; margin-top: 20px; border-radius: 10px; font-size: 1.15em; font-weight: 600; }
    .result.approved { background: #d4edda; color: #155724; }
    .result.rejected { background: #f8d7da; color: #721c24; }
    .result.error { background: #fff3cd; color: #856404; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="card">
    <h2>💳 Loan Approval Prediction</h2>
    <p class="subtitle">Enter applicant details to check loan eligibility</p>

    <form action="/predict" method="post" class="form-grid">

      <div class="form-group">
        <label>Gender</label>
        <select name="Gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>

      <div class="form-group">
        <label>Married</label>
        <select name="Married">
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>

      <div class="form-group">
        <label>Dependents</label>
        <select name="Dependents">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3+">3+</option>
        </select>
      </div>

      <div class="form-group">
        <label>Education</label>
        <select name="Education">
          <option value="Graduate">Graduate</option>
          <option value="Not Graduate">Not Graduate</option>
        </select>
      </div>

      <div class="form-group">
        <label>Self Employed</label>
        <select name="Self_Employed">
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Property Area</label>
        <select name="Property_Area">
          <option value="Urban">Urban</option>
          <option value="Semiurban">Semiurban</option>
          <option value="Rural">Rural</option>
        </select>
      </div>

      <div class="form-group">
        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome" required placeholder="e.g. 5000">
      </div>

      <div class="form-group">
        <label>Coapplicant Income</label>
        <input type="number" name="CoapplicantIncome" required placeholder="e.g. 1500">
      </div>

      <div class="form-group">
        <label>Loan Amount (thousands)</label>
        <input type="number" name="LoanAmount" required placeholder="e.g. 150">
      </div>

      <div class="form-group">
        <label>Loan Term (months)</label>
        <input type="number" name="Loan_Amount_Term" required value="360" min="12" step="12">
      </div>

      <div class="form-group">
        <label>Credit History</label>
        <select name="Credit_History">
          <option value="1">1 — Good</option>
          <option value="0">0 — Bad</option>
        </select>
      </div>

      <button type="submit">Predict Loan Approval</button>
    </form>

    {% if prediction_text %}
    <div class="result {{ 'approved' if 'Approved' in prediction_text else ('rejected' if 'Rejected' in prediction_text else 'error') }}">
      {{ prediction_text }}
    </div>
    {% endif %}
  </div>

</body>
</html>
